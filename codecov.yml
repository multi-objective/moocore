fixes:
  - "python/src/moocore/libmoocore/::c/" # Python package symlink
  - "src/moocore/libmoocore/::c/" # Python package symlink
  - "r/src/libmoocore/::c/" # R package symlink
  - "src/libmoocore/::c/" # R package symlink
  - ".tox/cov*/lib/*/site-packages/::python/src/"

comment:
  layout: "header, diff, flags, components"  # show component info in the PR comment

flag_management:
  default_rules: # the rules that will be followed for any flag added, generally
    carryforward: true

component_management:
  default_rules:  # default rules that will be inherited by all components
    statuses:
      - type: project # in this case every component that doesn't have a status defined will have a project type one
        target: auto
        threshold: 1%
        branches:
          - "!main"
      - type: patch
        target: auto
        threshold: 1%
        informational: true

  individual_components:
    - component_id: c_shared
      name: C
      paths:
        - c/**
      statuses:
        - type: project
          target: auto
          threshold: 1%
        - type: patch
          target: auto
          threshold: 1%
          informational: true

    - component_id: r_src
      name: R
      paths:
        - r/R/**
        - r/src/**
      statuses:
        - type: project
          target: auto
          threshold: 1%
          informational: true
        - type: patch
          target: auto
          threshold: 1%
          informational: true

    - component_id: python_tests
      name: Python tests
      paths:
        - python/tests/**
        - python/examples/**
      statuses:
        - type: project
          target: 100%
          informational: false
        - type: patch
          target: auto
          threshold: 1%
          informational: true

    - component_id: python_src
      name: Python src
      paths:
        - python/src/**
      statuses:
        - type: project
          target: auto
          threshold: 1%
          informational: true
        - type: patch
          target: auto
          threshold: 1%
          informational: true
